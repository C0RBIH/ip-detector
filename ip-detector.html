<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IP определитель | MSC VPN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2fa 0%, #dce5f0 100%);
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Inter', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            max-width: 620px;
            width: 100%;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .card-header {
            background: #0a2b3f;
            padding: 1.2rem 1rem;
            text-align: center;
            color: white;
        }

        .card-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .content {
            padding: 1.5rem;
        }

        .info-panel {
            background: #f8fafd;
            border-radius: 1.5rem;
            padding: 0.2rem 1rem 0.5rem 1rem;
            margin-bottom: 1.8rem;
            box-shadow: inset 0 1px 2px #00000008, 0 6px 12px -8px rgba(0, 0, 0, 0.1);
            border: 1px solid #eef2f8;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            padding: 1rem 0;
            border-bottom: 1px solid #e4ecf5;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e3a5f;
            background: #eef2fa;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-weight: 500;
            font-size: 0.95rem;
            color: #0a2a44;
            background: white;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            word-break: break-word;
            white-space: normal;
            text-align: right;
            letter-spacing: -0.2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            max-width: 65%;
            flex: 1 1 auto;
        }

        .location-value {
            font-family: inherit;
            font-weight: 500;
            background: #eef3fc;
        }

        .security-value {
            background: #e9f0fa;
            color: #0f4c6b;
            font-family: inherit;
            font-weight: 600;
        }

        .ip-copy-area {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
            flex: 1 1 auto;
        }

        .copy-btn {
            background: #eef2ff;
            border: none;
            font-size: 0.8rem;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            color: #1f5e8e;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            white-space: nowrap;
        }

        .copy-btn:hover:not(:disabled) {
            background: #d9e6ff;
            transform: scale(0.97);
            color: #0f3b5c;
        }

        .copy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #e9ecef;
            color: #6c7a8e;
        }

        .status-message {
            margin: 12px 0 0 0;
            font-size: 0.85rem;
            text-align: center;
            background: #f1f5f9;
            padding: 0.7rem;
            border-radius: 60px;
            color: #2c5f8a;
            transition: all 0.2s;
            word-break: break-word;
        }

        .status-error {
            background: #ffe6e5;
            color: #b13b2d;
        }

        .status-success {
            background: #e3f7ec;
            color: #1e6f3f;
        }

        .refresh-btn {
            background: #0a2b3f;
            border: none;
            width: 100%;
            padding: 0.9rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            box-shadow: 0 6px 12px -8px rgba(0, 0, 0, 0.2);
            font-family: inherit;
        }

        .refresh-btn:hover {
            background: #1b4f6e;
            transform: translateY(-2px);
        }

        .refresh-btn:active {
            transform: translateY(1px);
        }

        .refresh-btn:disabled {
            background: #7f8c9a;
            cursor: wait;
            transform: none;
        }

        .msc-footer {
            text-align: center;
            font-size: 0.75rem;
            background: #ecf3fa;
            margin-top: 1.5rem;
            padding: 0.8rem;
            border-radius: 2rem;
            color: #1b4a6e;
            font-weight: 500;
            border: 1px solid #dae6f2;
            line-height: 1.4;
        }

        /* ===== Мобильные улучшения: столбик и переносы ===== */
        @media (max-width: 550px) {
            body {
                padding: 0.8rem;
            }
            .card-header h1 {
                font-size: 1.5rem;
            }
            .content {
                padding: 1rem;
            }
            .info-panel {
                padding: 0 0.8rem 0.2rem 0.8rem;
            }
            .info-row {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 0.9rem 0;
            }
            .label {
                align-self: flex-start;
                font-size: 0.85rem;
            }
            .value {
                max-width: 100%;
                text-align: left;
                width: 100%;
                font-size: 0.9rem;
                padding: 0.5rem 1rem;
                word-break: break-all;
                white-space: normal;
            }
            .ip-copy-area {
                width: 100%;
                justify-content: space-between;
                flex-wrap: nowrap;
            }
            .copy-btn {
                white-space: nowrap;
                font-size: 0.75rem;
                padding: 0.4rem 0.9rem;
            }
            .security-value {
                text-align: center;
            }
            .refresh-btn {
                padding: 0.8rem;
                font-size: 0.95rem;
            }
            .status-message {
                font-size: 0.8rem;
                padding: 0.6rem;
            }
            .msc-footer {
                font-size: 0.7rem;
            }
        }

        /* для совсем узких экранов (≤380px) */
        @media (max-width: 380px) {
            .ip-copy-area {
                flex-wrap: wrap;
                gap: 8px;
            }
            .copy-btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <h1>
            🌐 IP определитель
        </h1>
    </div>
    <div class="content">
        <div class="info-panel">
            <div class="info-row">
                <span class="label">📡 IP-адрес</span>
                <div class="ip-copy-area">
                    <span id="ipValue" class="value">—</span>
                    <button id="copyIpBtn" class="copy-btn" disabled>📋 Копировать</button>
                </div>
            </div>
            <div class="info-row">
                <span class="label">📍 Местоположение</span>
                <span id="locationValue" class="value location-value">—</span>
            </div>
            <div class="info-row">
                <span class="label">🛡️ Безопасность</span>
                <span class="value security-value">MSC VPN • сквозное шифрование</span>
            </div>
        </div>

        <div id="statusMessage" class="status-message">
            ⚡ Загрузка данных...
        </div>

        <button id="refreshButton" class="refresh-btn">
            🔄 Обновить информацию
        </button>

        <div class="msc-footer">
            🔒 наша команда <strong>MSC VPN</strong> используют сквозное шифрование, ваш IP только у вас
        </div>
    </div>
</div>

<script>
    (function() {
        const ipSpan = document.getElementById('ipValue');
        const locationSpan = document.getElementById('locationValue');
        const copyBtn = document.getElementById('copyIpBtn');
        const refreshBtn = document.getElementById('refreshButton');
        const statusDiv = document.getElementById('statusMessage');

        let currentIp = null;
        let isLoading = false;

        function setStatus(text, isError = false, isSuccess = false) {
            statusDiv.textContent = text;
            statusDiv.classList.remove('status-error', 'status-success');
            if (isError) statusDiv.classList.add('status-error');
            else if (isSuccess) statusDiv.classList.add('status-success');
        }

        function getFlagEmoji(countryCode) {
            if (!countryCode || countryCode.length !== 2) return '';
            const codePoints = countryCode.toUpperCase().split('').map(ch => 127397 + ch.charCodeAt(0));
            return String.fromCodePoint(...codePoints);
        }

        function updateDisplay(ip, countryName, countryCode, city) {
            if (ip && ip !== '—') {
                ipSpan.textContent = ip;
                currentIp = ip;
                copyBtn.disabled = false;
                copyBtn.title = "Копировать IP";
            } else {
                ipSpan.textContent = '—';
                currentIp = null;
                copyBtn.disabled = true;
            }

            let locationText = '—';
            if (countryName && countryName !== '—') {
                let flag = (countryCode && countryCode.length === 2) ? getFlagEmoji(countryCode) + ' ' : '';
                let countryPart = `${flag}${countryName}`;
                if (city && city.trim() !== '') {
                    locationText = `${countryPart}, ${city}`;
                } else {
                    locationText = countryPart;
                }
            } else if (city && city.trim() !== '') {
                locationText = city;
            }
            locationSpan.textContent = locationText;
        }

        function resetDisplay() {
            ipSpan.textContent = '—';
            locationSpan.textContent = '—';
            currentIp = null;
            copyBtn.disabled = true;
        }

        async function fetchGeoData() {
            if (isLoading) return;
            isLoading = true;
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = "⏳ Загрузка...";
            setStatus("🔄 Определение IP и местоположения...", false, false);
            resetDisplay();

            const apiUrl = `https://api.2ip.io/?format=json&_=${Date.now()}`;
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' },
                    signal: controller.signal,
                    cache: 'no-store'
                });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (!data || typeof data !== 'object') throw new Error('Неверный ответ');

                const ipAddress = data.ip || null;
                const country = data.country || null;
                const countryCode = data.country_code || null;
                const city = data.city || null;

                if (!ipAddress) throw new Error('IP не определён');

                const finalCountry = (country && country.trim()) ? country : "🌍 Неизвестно";
                const finalCity = (city && city.trim()) ? city : null;
                updateDisplay(ipAddress, finalCountry, countryCode, finalCity);
                setStatus(`✅ Определено: ${ipAddress} — ${locationSpan.textContent}`, false, true);
                setTimeout(() => {
                    if (statusDiv.classList.contains('status-success'))
                        setStatus("🔐 Данные обновлены. Нажмите «Обновить» для повторной проверки", false, false);
                }, 3000);
            } catch (error) {
                console.warn(error);
                let errorMsg = "❌ Ошибка получения данных. ";
                if (error.name === 'AbortError') errorMsg += "Таймаут соединения.";
                else if (error.message.includes('fetch')) errorMsg += "Проверьте интернет.";
                else errorMsg += error.message || "Попробуйте позже.";
                setStatus(errorMsg, true, false);
                resetDisplay();
            } finally {
                isLoading = false;
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = "🔄 Обновить информацию";
            }
        }

        async function copyIpToClipboard() {
            if (!currentIp || currentIp === '—') {
                setStatus("⚠️ Нет IP для копирования. Обновите данные.", true, false);
                return;
            }
            try {
                await navigator.clipboard.writeText(currentIp);
                const original = copyBtn.innerHTML;
                copyBtn.innerHTML = "✅ Скопировано!";
                setStatus(`✅ IP ${currentIp} скопирован`, false, true);
                setTimeout(() => copyBtn.innerHTML = original, 1800);
                setTimeout(() => {
                    if (statusDiv.classList.contains('status-success'))
                        setStatus("🔒 MSC VPN: ваш IP только у вас", false, false);
                }, 2500);
            } catch {
                setStatus("❌ Не удалось скопировать IP.", true, false);
            }
        }

        function init() {
            fetchGeoData();
            refreshBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!isLoading) fetchGeoData();
                else setStatus("⏳ Подождите, запрос уже идёт...", false);
            });
            copyBtn.addEventListener('click', (e) => {
                e.preventDefault();
                copyIpToClipboard();
            });
            ipSpan.style.cursor = 'pointer';
            ipSpan.addEventListener('click', () => {
                if (currentIp) copyIpToClipboard();
                else setStatus("🔍 Сначала обновите данные", false);
            });
            ipSpan.title = "Нажмите, чтобы скопировать IP";
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    })();
</script>
</body>
</html>
